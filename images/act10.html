<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D</title> 
    <style>
        body {
            background-color: rgb(106, 104, 236);
            text-align: center;
            font-family: Arial, Helvetica, sans-serif;
            padding-top: 5px;
        }
        .title {
            font-size: 60px;
            color:rgb(255, 255, 255);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing:  6px;
            text-shadow: 2px 2px 0px black,
            3px 3px 0 white,4px 4px white,
            5px 5px 0 white,6px 6px white,
            7px 7px 0 white,8px 8px white,
            9px 9px 0 white,10px 10px white,
            20px 20px 30px white;
        
        }
        .subtitle {
            font-size: 30px;
            color:aquamarine;
            font-style:italic;
            margin-top: 20px;
        }
        .mordern-text {
            font-size: 30px;
            color: blue;
            font-weight:  bold;
            border:3px solid;
            display: inline-block;
            padding: 20px 40px;
            border-radius:30px;
            margin-top: 30px;
            box-shadow: 0 0 15px #801515
        }
        .golw {
            margin-top: 40px;
            font-size: 40px;
            color: #ff0015;
            text-shadow: 0 0 20px #ff0015
            1px 1px 0 #330509,
            2px 2px 0 #790606,
            3px 3px 0 #ff0015,
            4px 4px 0 #ff0015, 
            5px 5px 0 #ff0015,
            6px 6px 0 #ff0015;
        }
    </style>
</head>
<body>
    <h1 class="title">3d TEXT</h1>
    <p class="subtitle">HTML & CSS</p>
    <div class="modern-text">HTML & CSS</div>
</body>
</html>
